<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroPlanet 3D</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <div id="app">
    <header class="title">
      <span class="badge">ADHD Kids Mission</span>
      <h1>NeuroPlanet 3D</h1>
      <p>Odaberi svoju misiju i započni igru</p>
    </header>

    <main class="levels-wrap">
      <article class="level-card level-1 unlocked" onclick="startLevel(1)">
        <div class="level-top">
          <div class="svg-icon">
            <svg viewBox="0 0 24 24" class="level-svg">
              <g clip-path="url(#clip0_game)">
                <path d="M9.57 12.46L6.52 15.51"/>
                <path d="M6.55 12.49L9.60 15.54"/>
                <path d="M13.53 14H13.54"/>
                <path d="M17.47 14H17.48"/>
                <path d="M15.5 15.98V15.96"/>
                <path d="M15.5 12.03V12.01"/>
                <path d="M9 22H15C20 22 22 20 22 15V13C22 8 20 6 15 6H9C4 6 2 8 2 13V15C2 20 4 22 9 22Z"/>
                <path d="M13.01 2L13 3.01C12.99 3.56 12.55 4 12 4H11.97C11.42 4 10.98 4.45 10.98 5C10.98 5.55 11.43 6 11.98 6H12.98"/>
              </g>

              <defs>
                <clipPath id="clip0_game">
                  <rect width="24" height="24"/>
                </clipPath>
              </defs>
            </svg>
          </div>

          <span class="status open">Otključano</span>
        </div>

        <h2>Level 1</h2>
        <p>Slova i glasovi</p>
        <button type="button">Započni misiju</button>
      </article>

      <article class="level-card level-2 locked" onclick="lockedLevel(2)">

        <div class="level-top">

          <div class="svg-icon">

            <svg viewBox="0 0 24 24" class="level-svg">

              <g clip-path="url(#clip0_attention)">

                <path
                  d="M21 7V17C21 20 19.5 22 16 22H8C4.5 22 3 20 3 17V7C3 4 4.5 2 8 2H16C19.5 2 21 4 21 7Z"
                />

                <path
                  d="M16.25 11H7.75C6.79 11 6 10.21 6 9.25V6.75C6 5.79 6.79 5 7.75 5H16.25C17.21 5 18 5.79 18 6.75V9.25C18 10.21 17.21 11 16.25 11Z"
                />

                <path
                  d="M10.3 15.2793L8 17.5793"
                />

                <path
                  d="M8.03003 15.3105L10.33 17.6105"
                />

                <path
                  d="M16.49 15.3301H16.51"
                />

                <path
                  d="M14.49 17.5005V17.4805"
                />

              </g>

              <defs>
                <clipPath id="clip0_attention">
                  <rect width="24" height="24" />
                </clipPath>
              </defs>

            </svg>

          </div>

          <span class="status lock">
            Zaključano
          </span>

        </div>

        <h2>Level 2</h2>

        <p>
          Pažnja i reakcija
        </p>

        <button type="button">
          Zaključano
        </button>

      </article>

      <article class="level-card level-3 locked" onclick="lockedLevel(3)">

        <div class="level-top">

          <div class="svg-icon">

            <svg viewBox="0 0 24 24" class="level-svg">

              <g clip-path="url(#clip0_memory)">

                <path
                  d="M16.92 8.80024L13.7 12.0202L4.12 21.6003L3.54 21.8903C2.83 22.2403 2 21.7303 2 20.9303V3.07026C2 2.27026 2.83 1.76024 3.55 2.11024L16.92 8.80024Z"
                />

                <g opacity="0.4">

                  <path
                    d="M21.3995 12.9508L16.8795 15.2108L13.6895 12.0208L16.9095 8.80078L21.3995 11.0508C22.1895 11.4408 22.1895 12.5608 21.3995 12.9508Z"
                  />

                  <path
                    d="M16.8901 15.2095L4.12012 21.5995L13.7001 12.0195L16.8901 15.2095Z"
                  />

                  <path
                    d="M13.6998 12.0201L4.08984 2.41016"
                  />

                </g>

              </g>

              <defs>
                <clipPath id="clip0_memory">
                  <rect width="24" height="24" />
                </clipPath>
              </defs>

            </svg>

          </div>

          <span class="status lock">
            Zaključano
          </span>

        </div>

        <h2>Level 3</h2>

        <p>
          Memorija
        </p>

        <button type="button">
          Zaključano
        </button>

      </article>
    </main>
  </div>

  <button id="pauseOrbitBtn" class="orbit-btn" type="button" onclick="toggleOrbit()" aria-label="Pauziraj model">
    <svg id="orbitIcon" viewBox="0 0 24 24">
      <path id="orbitIconPath1" d="M8 5V19"></path>
      <path id="orbitIconPath2" d="M16 5V19"></path>
    </svg>
  </button>

  <section class="kid-modal" id="lockedModal">
    <div class="kid-modal-box">
      <button class="kid-modal-close" type="button" onclick="closeLockedModal()" aria-label="Zatvori">
        ×
      </button>

      <div class="kid-face">
        <svg viewBox="0 0 24 24" class="sad-icon">
          <g clip-path="url(#clip0_sad)">
            <path d="M9 22H15C20 22 22 20 22 15V9C22 4 20 2 15 2H9C4 2 2 4 2 9V15C2 20 4 22 9 22Z"/>
            <path d="M7 8.75C8 7.75 9.63 7.75 10.64 8.75"/>
            <path d="M13.36 8.75C14.36 7.75 15.99 7.75 17 8.75"/>
            <path d="M8.4 17.7H15.6C16.1 17.7 16.5 17.3 16.5 16.8C16.5 14.31 14.49 12.3 12 12.3C9.51 12.3 7.5 14.31 7.5 16.8C7.5 17.3 7.9 17.7 8.4 17.7Z"/>
          </g>

          <defs>
            <clipPath id="clip0_sad">
              <rect width="24" height="24"/>
            </clipPath>
          </defs>
        </svg>
      </div>

      <h2>Ups! Level je zaključan</h2>
      <p>
        Moraš prvo riješiti <strong>Level 1</strong> da otključaš ovu misiju.
      </p>

      <button class="kid-modal-btn" type="button" onclick="closeLockedModal()">
        U redu, idem na Level 1
      </button>
    </div>
  </section>

  <script>
    let orbitState = false;

    function startLevel(level) {
      window.location.href = `/level${level}.html`;
    }

    function lockedLevel(level) {
      document.getElementById("lockedModal").classList.add("show");
    }

    function closeLockedModal() {
      document.getElementById("lockedModal").classList.remove("show");
    }

    function toggleOrbit() {
      orbitState = !orbitState;

      const btn = document.getElementById("pauseOrbitBtn");
      const path1 = document.getElementById("orbitIconPath1");
      const path2 = document.getElementById("orbitIconPath2");

      window.dispatchEvent(
        new CustomEvent("pause-orbit", {
          detail: {
            paused: orbitState
          }
        })
      );

      if (orbitState) {
        btn.classList.add("paused");
        btn.setAttribute("aria-label", "Pokreni model");

        path1.setAttribute("d", "M8 5V19L19 12L8 5Z");
        path2.setAttribute("d", "");
      } else {
        btn.classList.remove("paused");
        btn.setAttribute("aria-label", "Pauziraj model");

        path1.setAttribute("d", "M8 5V19");
        path2.setAttribute("d", "M16 5V19");
      }
    }
  </script>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
